<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Scan</title>

<style>

body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family:Consolas, monospace;
    overflow:hidden;
}

#terminal{
    padding:30px;
    font-size:22px;
    white-space:pre-line;
}

.line{
    margin-bottom:10px;
}

#catScreen{
    display:none;
    position:fixed;
    inset:0;
    background:black;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    animation:fadeIn .8s;
}

#catScreen img{
    width:min(70vw,550px);
    border-radius:20px;
    box-shadow:0 0 40px #00ff66;
}

h1{
    color:#00ff66;
    font-size:4rem;
    margin:25px 0 10px;
}

p{
    font-size:1.5rem;
}

button{
    margin-top:20px;
    padding:15px 30px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:10px;
}

@keyframes fadeIn{
    from{opacity:0}
    to{opacity:1}
}

.blink{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0}
}

</style>
</head>
<body>

<div id="terminal"></div>

<div id="catScreen">

<img src="tosia.jpg">

<h1>😼 ZOSTAŁEŚ ZCATOWANY 😼</h1>

<p>Przez Tosię.</p>

<p>Twój komputer jest bezpieczny.<br>
Twoja godność już nie.</p>

<p><b>MIAU.</b></p>

<button onclick="location.reload()">
Uruchom skan ponownie
</button>

<audio autoplay>
<source src="miau.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const lines = [
"CATSCAN v2.0",
"",
"> Łączenie z CATNET...",
"> Połączenie ustanowione",
"",
"> Analiza systemu...",
"> Skanowanie folderu Pobrane...",
"> Skanowanie zdjęć...",
"> Skanowanie memów...",
"",
"> Znaleziono 481 memów",
"> Znaleziono 27 screenshotów",
"> Znaleziono 1 podejrzanego użytkownika",
"",
"> PRZEJMOWANIE KONTROLI...",
"",
"3...",
"2...",
"1..."
];

const terminal = document.getElementById("terminal");

let i = 0;

function nextLine(){

    if(i < lines.length){

        const div = document.createElement("div");
        div.className = "line";
        div.textContent = lines[i];

        terminal.appendChild(div);

        window.scrollTo(0, document.body.scrollHeight);

        i++;

        setTimeout(nextLine, 700);

    }else{

        setTimeout(() => {

            terminal.style.display = "none";

            document.getElementById("catScreen").style.display = "flex";

        }, 1200);

    }

}

nextLine();

</script>

</body>
</html>
