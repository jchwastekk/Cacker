<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Scan</title>

<style>

body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family:Consolas, monospace;
    overflow:hidden;
}

#terminal{
    padding:30px;
    font-size:22px;
    white-space:pre-line;
}

.line{
    margin-bottom:10px;
}

#catScreen{
    display:none;
    position:fixed;
    inset:0;
    background:black;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    animation:fadeIn .8s;
}

#catScreen img{
    width:min(50vw,400px);

    animation:
        floatCat 3s ease-in-out infinite,
        glowCat 2s ease-in-out infinite;
}

@keyframes floatCat{
    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

@keyframes glowCat{
    0%{
        filter:drop-shadow(0 0 5px #00ff66);
    }

    50%{
        filter:drop-shadow(0 0 30px #00ff66);
    }

    100%{
        filter:drop-shadow(0 0 5px #00ff66);
    }
}

h1{
    color:#00ff66;
    font-size:4rem;
    margin:25px 0 10px;
}

p{
    font-size:1.5rem;
}

button{
    margin-top:20px;
    padding:15px 30px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:10px;
}

@keyframes fadeIn{
    from{opacity:0}
    to{opacity:1}
}

.blink{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0}
}

</style>
</head>
<body>

<div id="terminal"></div>

<div id="catScreen">

<img id="tosia" src="tosia.png">

<h1>😼 ZOSTAŁEŚ ZHACATOWANY 😼</h1>

<p>Przez Tosię.</p>

<p>Twój komputer jest bezpieczny.<br>
Twoja godność już nie.</p>

<p><b>MIAU.</b></p>

<button onclick="location.reload()">
Uruchom skan ponownie
</button>

<audio id="meow">
    <source src="miau.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const lines = [
"CATSCAN v2.0",
"",
"> Łączenie z CATNET...",
"> Połączenie ustanowione",
"",
"> Analiza systemu...",
"> Skanowanie folderu Pobrane...",
"> Skanowanie zdjęć...",
"> Skanowanie memów...",
"",
"> Znaleziono trojana w ostatnim pobranym porno",
"> Znaleziono 27 screenshotów koleżanek",
"> Znaleziono 1 Bambika",
"",
"> PRZEJMOWANIE KONTROLI...",
"",
"3...",
"2...",
"1..."
];

const terminal = document.getElementById("terminal");

let i = 0;

function nextLine(){

    if(i < lines.length){

        const div = document.createElement("div");
        div.className = "line";
        div.textContent = lines[i];

        terminal.appendChild(div);

        window.scrollTo(0, document.body.scrollHeight);

        i++;

        setTimeout(nextLine, 700);

    }else{

        setTimeout(() => {

            terminal.style.display = "none";

            document.getElementById("catScreen").style.display = "flex";

                const meow = document.getElementById("meow");
                meow.currentTime = 0;
                meow.play().catch(err => console.log(err));

        }, 1200);

    }

}

nextLine();

const cat = document.getElementById("tosia");

setInterval(() => {

    if(document.getElementById("catScreen").style.display === "flex") {

        cat.animate([
            { transform: 'scale(1)' },
            { transform: 'scale(1.08)' },
            { transform: 'scale(1)' }
        ], {
            duration: 250
        });

    }

}, 6000);

document.addEventListener("click", () => {
    document.documentElement.requestFullscreen();
}, { once: true });
    
</script>

</body>
</html>
