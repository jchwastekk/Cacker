<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CATRIX</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family:Consolas, monospace;
    overflow:hidden;
}

#matrix{
    position:fixed;
    inset:0;
    z-index:-1;
}

#terminal{
    padding:30px;
    font-size:22px;
    white-space:pre-line;
    text-shadow:0 0 10px #00ff66;
}

.line{
    margin-bottom:10px;
    animation:fadeLine .25s;
}

@keyframes fadeLine{
    from{
        opacity:0;
        transform:translateY(5px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

#catScreen{
    display:none;
    position:fixed;
    inset:0;
    background:black;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    animation:fadeIn .8s;
}

#catScreen img{
    width:min(50vw,400px);

    animation:
        floatCat 3s ease-in-out infinite,
        glowCat 2s ease-in-out infinite;
}

@keyframes floatCat{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
}

@keyframes glowCat{
    0%{
        filter:drop-shadow(0 0 5px #00ff66);
    }
    50%{
        filter:drop-shadow(0 0 35px #00ff66);
    }
    100%{
        filter:drop-shadow(0 0 5px #00ff66);
    }
}

.glitch{
    position:relative;
    animation:glitch .15s infinite;
}

@keyframes glitch{
    0%{transform:translate(0);}
    25%{transform:translate(2px,-1px);}
    50%{transform:translate(-2px,1px);}
    75%{transform:translate(1px,2px);}
    100%{transform:translate(0);}
}

h1{
    color:#00ff66;
    font-size:4rem;
    margin:25px 0 10px;
    text-shadow:0 0 20px #00ff66;
}

p{
    font-size:1.5rem;
}

button{
    margin-top:20px;
    padding:15px 30px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    background:#00ff66;
    color:black;
    font-weight:bold;
}

button:hover{
    transform:scale(1.05);
}

@keyframes fadeIn{
    from{opacity:0}
    to{opacity:1}
}

#flash{
    position:fixed;
    inset:0;
    background:white;
    opacity:0;
    pointer-events:none;
}

</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="flash"></div>

<div id="terminal"></div>

<div id="catScreen">

<img id="tosia" src="tosia.png">

<h1 class="glitch">😼 ZOSTAŁEŚ ZHACATOWANY 😼</h1>

<p>Przez Tosię.</p>

<p>
Twój komputer jest bezpieczny.<br>
Twoja godność już nie.
</p>

<p><b>MIAU.</b></p>

<button onclick="location.reload()">
Uruchom skan ponownie
</button>

<audio id="meow">
    <source src="miau.mp3" type="audio/mpeg">
</audio>

</div>

<script>

/* ===========================
   MATRIX RAIN
=========================== */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const chars =
"アイウエオカキクケコサシスセソタチツテトABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

const fontSize = 18;
let columns = Math.floor(window.innerWidth / fontSize);
let drops = Array(columns).fill(1);

function drawMatrix(){

    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#00ff66";
    ctx.font = fontSize + "px monospace";

    for(let i=0;i<drops.length;i++){

        const text =
            chars[Math.floor(Math.random() * chars.length)];

        ctx.fillText(
            text,
            i * fontSize,
            drops[i] * fontSize
        );

        if(
            drops[i] * fontSize > canvas.height &&
            Math.random() > 0.975
        ){
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(drawMatrix,33);

/* ===========================
   TERMINAL
=========================== */

const lines = [

"CATNET MATRIX v5.7",
"",
"> Inicjalizacja tunelu kwantowego...",
"> Łączenie z CATNET...",
"> Połączenie ustanowione",
"",
"> Omijanie zabezpieczeń...",
"> Firewall pominięty",
"",
"> Analiza systemu...",
"> Skanowanie folderu Pobrane...",
"> Skanowanie zdjęć...",
"> Skanowanie memów...",
"> Skanowanie kota...",
"",
"> Odczyt poziomu miauczenia...",
"> ROOT ACCESS GRANTED",
"",
"> Instalacja TOSIA.EXE",
"> Wgrywanie futra...",
"> Wgrywanie chaosu...",
"",
"> SYSTEM PRZEJĘTY",
"",
"3...",
"2...",
"1..."

];

const terminal = document.getElementById("terminal");

let i = 0;

function nextLine(){

    if(i < lines.length){

        const div = document.createElement("div");
        div.className = "line";
        div.textContent = lines[i];

        terminal.appendChild(div);

        window.scrollTo(
            0,
            document.body.scrollHeight
        );

        i++;

        if(Math.random() > 0.7){
            randomBeep();
        }

        setTimeout(nextLine, 650);

    }else{

        setTimeout(showCat,1200);

    }
}

/* ===========================
   DŹWIĘKI MATRIXOWE
=========================== */

function beep(freq,duration){

    const audioCtx =
        new (window.AudioContext ||
        window.webkitAudioContext)();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.value = freq;

    gain.gain.value = 0.03;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();

    setTimeout(()=>{
        osc.stop();
        audioCtx.close();
    },duration);
}

function randomBeep(){

    const sounds = [
        [500,80],
        [800,90],
        [1200,70],
        [1500,60],
        [1800,50]
    ];

    const s =
        sounds[Math.floor(Math.random()*sounds.length)];

    beep(s[0],s[1]);
}

/* ===========================
   KOT
=========================== */

function showCat(){

    beep(1800,100);

    setTimeout(()=>{
        beep(900,120);
    },150);

    setTimeout(()=>{
        beep(2200,80);
    },320);

    setTimeout(()=>{

        const flash =
            document.getElementById("flash");

        flash.style.opacity = "1";

        setTimeout(()=>{
            flash.style.opacity = "0";
        },100);

    },450);

    setTimeout(()=>{

        terminal.style.display = "none";

        document.getElementById("catScreen")
            .style.display = "flex";

        const meow =
            document.getElementById("meow");

        meow.currentTime = 0;

        meow.play().catch(err=>{
            console.log(err);
        });

    },650);
}

nextLine();

/* ===========================
   PULS KOTA
=========================== */

const cat =
    document.getElementById("tosia");

setInterval(()=>{

    if(
        document.getElementById("catScreen")
        .style.display === "flex"
    ){

        cat.animate(
        [
            {transform:"scale(1)"},
            {transform:"scale(1.08)"},
            {transform:"scale(1)"}
        ],
        {
            duration:250
        });

    }

},6000);

/* ===========================
   FULLSCREEN
=========================== */

document.addEventListener("click",()=>{

    if(document.documentElement.requestFullscreen){
        document.documentElement.requestFullscreen();
    }

},{once:true});

</script>

</body>
</html>
