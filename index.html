<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CATNET MATRIX</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family:Consolas, monospace;
    overflow:hidden;
}


#startScreen{
    position:fixed;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    background:black;

    color:#00ff66;

    font-size:42px;
    font-weight:bold;

    text-align:center;

    z-index:9999;

    cursor:pointer;

    text-shadow:
        0 0 0px #00ff66,
        0 0 0px #00ff66,
        0 0 0px #00ff66;
}

#startBtn{
    padding:18px 40px;

    font-size:24px;
    font-weight:bold;

    background:#111;
    color:#00ff66;

    border:2px solid #00ff66;

    border-radius:8px;

    cursor:pointer;

    box-shadow:
        0 0 10px #00ff66,
        0 0 20px #00ff66;

    transition:.2s;
}

#startBtn:hover{
    transform:scale(1.08);

    box-shadow:
        0 0 20px #00ff66,
        0 0 40px #00ff66;
}

#startBtn:active{
    transform:scale(0.95);
}
    
#matrix{
    position:fixed;
    inset:0;
    z-index:-1;
}

#terminal{
    padding:30px;
    font-size:25px;
    white-space:pre-line;
    text-shadow:0 0 10px #00ff66;
}


.line{
    margin-bottom:10px;
    animation:fadeLine .25s;
}

@keyframes fadeLine{
    from{
        opacity:0;
        transform:translateY(5px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

#catScreen{
    display:none;
    position:fixed;
    inset:0;
    background:black;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    animation:fadeIn .8s;
}

#catScreen img{
    width:min(50vw,400px);

    animation:
        floatCat 3s ease-in-out infinite,
        glowCat 2s ease-in-out infinite;
}

@keyframes floatCat{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
}

@keyframes glowCat{
    0%{
        filter:drop-shadow(0 0 5px #00ff66);
    }
    50%{
        filter:drop-shadow(0 0 35px #00ff66);
    }
    100%{
        filter:drop-shadow(0 0 5px #00ff66);
    }
}

.glitch{
    position:relative;
    animation:glitch .15s infinite;
}

@keyframes glitch{
    0%{transform:translate(0);}
    25%{transform:translate(2px,-1px);}
    50%{transform:translate(-2px,1px);}
    75%{transform:translate(1px,2px);}
    100%{transform:translate(0);}
}

h1{
    color:#00ff66;
    font-size:4rem;
    margin:25px 0 10px;
    text-shadow:0 0 20px #00ff66;
}

p{
    font-size:1.5rem;
}

button{
    margin-top:20px;
    padding:15px 30px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    background:#00ff66;
    color:black;
    font-weight:bold;
}

button:hover{
    transform:scale(1.05);
}

@keyframes fadeIn{
    from{opacity:0}
    to{opacity:1}
}

#flash{
    position:fixed;
    inset:0;
    background:white;
    opacity:0;
    pointer-events:none;
}

#progressContainer{
    width:600px;
    max-width:80vw;
    height:25px;
    border:2px solid #00ff66;
    margin:20px auto;
    display:none;

    box-shadow:
        0 0 10px #00ff66,
        0 0 20px #00ff66;
}

#progressBar{
    width:0%;
    height:100%;
    background:#00ff66;

    box-shadow:
        0 0 15px #00ff66,
        0 0 30px #00ff66;
}

#progressText{
    display:none;
    text-align:center;
    font-size:28px;
    margin-top:10px;
    font-weight:bold;
    color:#00ff66;
}


</style>
</head>
<body>

<div id="startScreen">
    CAUTION: MALWARE DETECTED<br><br>

    
    <button id="startBtn">
        DELETE IT
    </button>
    
</div>

<canvas id="matrix"></canvas>

<div id="flash"></div>

<div id="terminal"></div>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<div id="progressText"></div>

<div id="catScreen">

<img id="tosia" src="tosia.png">

<h1 class="glitch">ZOSTAŁEŚ ZHACATOWANY</h1>

<p>PZEZ TOSIĘ</p>

<p>
TWÓW STRUP JEST BEZPIECZNY<br>
ALE NIE KLIKAJ W CO POPADNIE BAMBIKU
</p>



<audio id="meow">
    <source src="miau.mp3" type="audio/mpeg">
</audio>

</div>

<script>

/* ===========================
   MATRIX RAIN
=========================== */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const chars =
"アイウエオカキクケコサシスセソタチツテトABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

const fontSize = 18;
let columns = Math.floor(window.innerWidth / fontSize);
let drops = Array(columns).fill(1);

function drawMatrix(){

    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#00ff66";
    ctx.font = fontSize + "px monospace";

    for(let i=0;i<drops.length;i++){

        const text =
            chars[Math.floor(Math.random() * chars.length)];

        ctx.fillText(
            text,
            i * fontSize,
            drops[i] * fontSize
        );

        if(
            drops[i] * fontSize > canvas.height &&
            Math.random() > 0.975
        ){
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(drawMatrix,33);

/* ===========================
   TERMINAL
=========================== */

const lines = [

"CATRIX",
"",
"> INITIATION",
"> CLICK TO CANCEL",
"",
"",
"> CONNECTING WITH CATNET",
"> CONNECTION ESTABLISHED",
"",
"> FIREWALL BYPASSED",
"",
"> SYSTEM SCANNING",
"> ROOT ACCESS GRANTED",
"",
"> TOSIA.EXE INSTALATION",
"> UPLOADING THE BTC CAPTURE KEY",

"",
"> SYSTEM CRITICAL STATUS",
"",


];

const terminal = document.getElementById("terminal");

let i = 0;

function nextLine(){

    if(i < lines.length){

        const div = document.createElement("div");
        div.className = "line";
        div.textContent = lines[i];

        terminal.appendChild(div);

        window.scrollTo(
            0,
            document.body.scrollHeight
        );

        i++;

        if(Math.random() > 0.7){
            randomBeep();
        }

        setTimeout(nextLine, 1000);

    }else{

    setTimeout(async ()=>{

        await furInitialization();

        showCat();

    },1200);

}
}

/* ===========================
   DŹWIĘKI MATRIXOWE
=========================== */

function beep(freq,duration){

    const audioCtx =
        new (window.AudioContext ||
        window.webkitAudioContext)();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.value = freq;

    gain.gain.value = 0.03;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();

    setTimeout(()=>{
        osc.stop();
        audioCtx.close();
    },duration);
}

function randomBeep(){

    const sounds = [
        [500,80],
        [800,90],
        [1200,70],
        [1500,60],
        [1800,50]
    ];

    const s =
        sounds[Math.floor(Math.random()*sounds.length)];

    beep(s[0],s[1]);
}

async function furInitialization(){

    const container =
        document.getElementById("progressContainer");

    const bar =
        document.getElementById("progressBar");

    const text =
        document.getElementById("progressText");

    container.style.display = "block";
    text.style.display = "block";

    for(let p=0;p<=100;p++){

        bar.style.width = p + "%";

        text.textContent =
            "UPLOADING: " + p + "%";

        if(p % 10 === 0){
            randomBeep();
        }

        await new Promise(r=>setTimeout(r,40));
    }

    container.style.display = "none";
    text.style.display = "none";
}

/* ===========================
   KOT
=========================== */

function showCat(){

    beep(1800,100);

    setTimeout(()=>{
        beep(900,120);
    },150);

    setTimeout(()=>{
        beep(2200,80);
    },320);

    setTimeout(()=>{

        const flash =
            document.getElementById("flash");

        flash.style.opacity = "1";

        setTimeout(()=>{
            flash.style.opacity = "0";
        },100);

    },450);

    setTimeout(()=>{

        terminal.style.display = "none";

        document.getElementById("catScreen")
            .style.display = "flex";

        const meow =
            document.getElementById("meow");

        meow.currentTime = 0;

        meow.play().catch(err=>{
            console.log(err);
        });

    },650);
}



/* ===========================
   PULS KOTA
=========================== */

const cat =
    document.getElementById("tosia");

setInterval(()=>{

    if(
        document.getElementById("catScreen")
        .style.display === "flex"
    ){

        cat.animate(
        [
            {transform:"scale(1)"},
            {transform:"scale(1.08)"},
            {transform:"scale(1)"}
        ],
        {
            duration:250
        });

    }

},6000);



const startScreen =
    document.getElementById("startScreen");

startScreen.addEventListener("click",()=>{

    startScreen.style.display = "none";

    if(document.documentElement.requestFullscreen){
        document.documentElement.requestFullscreen();
    }

    nextLine();

},{once:true});

</script>

</body>
</html>
